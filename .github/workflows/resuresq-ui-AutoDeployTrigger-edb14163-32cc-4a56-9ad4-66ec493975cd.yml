name: Trigger auto deployment for resuresq-ui

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/resuresq-ui-AutoDeployTrigger-edb14163-32cc-4a56-9ad4-66ec493975cd.yml"

  # Allow manual trigger
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.RESURESQUI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.RESURESQUI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.RESURESQUI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/frontend
          dockerfilePath: Dockerfile
          registryUrl: resuresqreg.azurecr.io
          registryUsername: ${{ secrets.RESURESQUI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.RESURESQUI_REGISTRY_PASSWORD }}
          containerAppName: resuresq-ui
          resourceGroup: resumeresq-rg
          imageToBuild: resuresqreg.azurecr.io/resuresq-ui:${{ github.sha }}
          buildArguments: VITE_API_URL=https://api.resuresq.app
